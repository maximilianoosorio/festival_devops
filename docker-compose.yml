version: '3.8'

services:
  database:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: devops_password
      MYSQL_DATABASE: festival_db
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - festival_network
    restart: always

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=database
      - DB_USER=root
      - DB_PASSWORD=devops_password
      - DB_NAME=festival_db
    depends_on:
      - database
    networks:
      - festival_network

  frontend:
    build: ./frontend
    ports:
      - "8080:80" # <-- Aquí está el cambio clave
    depends_on:
      - backend
    networks:
      - festival_network

volumes:
  db_data:

networks:
  festival_network:
    driver: bridge